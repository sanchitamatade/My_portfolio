<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanchita Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#ff4d6d,#7b2cbf,#00b4d8);
}

.hero h1{
    font-size:4rem;
    margin-bottom:10px;
}

.hero p{
    font-size:1.2rem;
    max-width:500px;
}

.btn{
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}

.about{
    padding:80px 20px;
    text-align:center;
}

.skills{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}

.skill{
    background:#1f1f1f;
    padding:12px 20px;
    border-radius:20px;
}

footer{
    text-align:center;
    padding:20px;
    color:#999;
}
</style>
</head>

<body>

<section class="hero">
    <h1>Hey, I'm Sanchita ✨</h1>
    <p>Frontend Developer • Freelancer • Creating Modern Web Experiences</p>
    <a href="#" class="btn">View My Work</a>
</section>

<section class="about">
    <h2>About Me 🚀</h2>
    <p style="margin-top:15px;">
        Passionate frontend developer learning HTML, CSS, JavaScript and building awesome websites.
    </p>

    <div class="skills">
        <div class="skill">HTML</div>
        <div class="skill">CSS</div>
        <div class="skill">JavaScript</div>
        <div class="skill">GitHub</div>
        <div class="skill">Freelancing</div>
    </div>
</section>

<footer>
    © 2026 Sanchita Matade
</footer>

</body>
</html>
